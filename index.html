<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Enterprise Wareneingangssystem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
 --primary:#1f2937;
 --secondary:#2563eb;
 --success:#16a34a;
 --warning:#f59e0b;
 --danger:#dc2626;
 --bg:#f4f6f9;
}

*{box-sizing:border-box;font-family:"Segoe UI",system-ui;}
body{margin:0;background:var(--bg);}
.hidden{display:none;}

.card{
 background:white;
 padding:24px;
 border-radius:14px;
 box-shadow:0 15px 30px rgba(0,0,0,.12);
 margin-bottom:20px;
}

button{
 background:var(--secondary);
 color:white;
 border:none;
 padding:14px;
 border-radius:8px;
 cursor:pointer;
}

input,select,textarea{
 width:100%;
 padding:12px;
 margin-bottom:12px;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #ddd;}
th{background:#f1f5f9;text-align:left}

.ok{color:var(--success);font-weight:bold;}
.warn{color:var(--warning);font-weight:bold;}
.bad{color:var(--danger);font-weight:bold;}

/* LOGIN */
#loginPage{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
}

.login-box{
 width:380px;
 padding:40px;
 background:white;
 border-radius:14px;
}

/* APP */
#app{display:none;}
.sidebar{
 width:260px;
 height:100vh;
 position:fixed;
 background:var(--primary);
 color:white;
 padding:20px;
}
.sidebar h1{margin-bottom:30px;font-size:20px;}
.sidebar button{
 width:100%;
 background:none;
 border:none;
 color:white;
 text-align:left;
 padding:14px;
 border-radius:8px;
}
.sidebar button:hover{background:rgba(255,255,255,.15);}

.main{
 margin-left:280px;
 padding:30px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
 <div class="login-box card">
  <h2>System Login</h2>
  <input id="loginEmail" placeholder="E‑Mail">
  <input id="loginPassword" type="password" placeholder="Passwort">
  <button onclick="handleLogin()">Anmelden</button>
  <p id="loginError" style="color:red;"></p>
 </div>
</div>

<!-- APP -->
<div id="app">
 <div class="sidebar">
  <h1>Wareneingang</h1>
  <button onclick="showPage('receive')"><i class="fa fa-truck"></i> Wareneingang</button>
  <button onclick="showPage('history')"><i class="fa fa-clock"></i> Historie</button>
  <button onclick="showPage('users')" id="usersBtn"><i class="fa fa-users"></i> Benutzer</button>
  <button onclick="logout()"><i class="fa fa-sign-out"></i> Logout</button>
 </div>

 <div class="main">

  <p><b>Eingeloggt als:</b> <span id="currentUserSpan"></span></p>

  <!-- WARNEINGANG -->
  <div id="receive" class="card">
   <h2>Wareneingang</h2>

   <input id="barcode" placeholder="Barcode / Artikelnummer" autofocus>
   <input id="product" placeholder="Produkt">
   <input type="number" id="qty" placeholder="Menge">

   <select id="state" onchange="togglePhoto()">
    <option value="ok">In Ordnung</option>
    <option value="warn">Leichte Mängel</option>
    <option value="bad">Beschädigt</option>
   </select>

   <textarea id="note" placeholder="Bemerkung (Pflicht bei Schaden)"></textarea>
   <input type="file" id="photo" class="hidden">

   <button onclick="saveEntry()">Wareneingang buchen</button>
  </div>

  <!-- HISTORIE -->
  <div id="history" class="card hidden">
   <h2>Historie</h2>
   <table id="historyTable"></table>
  </div>

  <!-- BENUTZER -->
  <div id="users" class="card hidden">
   <h2>Benutzerverwaltung</h2>
   <input id="newUserEmail" placeholder="E‑Mail">
   <input id="newUserPassword" placeholder="Passwort">
   <select id="newUserRole">
    <option value="employee">Mitarbeiter</option>
    <option value="admin">Admin</option>
   </select>
   <button onclick="addUser()">Benutzer anlegen</button>
   <table id="userTable"></table>
  </div>

 </div>
</div>

<script>
/* ===== USER SYSTEM ===== */
let users = JSON.parse(localStorage.getItem("users")) || [
 {email:"admin@firma.de",password:"admin123",role:"admin"}
];
localStorage.setItem("users",JSON.stringify(users));

let entries = JSON.parse(localStorage.getItem("entries")) || [];
let currentUser = null;

/* ===== LOGIN ===== */
function handleLogin(){
 const email = loginEmail.value.trim();
 const password = loginPassword.value.trim();

 const user = users.find(u => u.email === email && u.password === password);
 if(!user){
  loginError.innerText = "Ungültige Zugangsdaten";
  return;
 }

 currentUser = user;
 loginPage.style.display = "none";
 app.style.display = "block";
 currentUserSpan.innerText = user.email + " (" + user.role + ")";

 if(user.role !== "admin") usersBtn.style.display="none";
 showPage("receive");
 render();
}

/* ===== NAV ===== */
function showPage(id){
 document.querySelectorAll(".main > div")
  .forEach(d => d.classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
}

function logout(){
 location.reload();
}

/* ===== WARNEINGANG ===== */
function togglePhoto(){
 photo.classList.toggle("hidden", state.value==="ok");
}

function saveEntry(){
 if(state.value!=="ok" && !note.value){
  alert("Bemerkung erforderlich bei Schaden!");
  return;
 }

 entries.push({
  date:new Date().toLocaleString(),
  barcode:barcode.value,
  product:product.value,
  qty:qty.value,
  state:state.value,
  note:note.value,
  user:currentUser.email
 });

 localStorage.setItem("entries",JSON.stringify(entries));
 barcode.value=product.value=qty.value=note.value="";
 render();
}

/* ===== RENDER ===== */
function render(){
 historyTable.innerHTML = `
 <tr><th>Datum</th><th>Produkt</th><th>Menge</th><th>Zustand</th><th>Mitarbeiter</th></tr>
 ` + entries.map(e=>`
 <tr>
  <td>${e.date}</td>
  <td>${e.product}</td>
  <td>${e.qty}</td>
  <td class="${e.state}">${e.state}</td>
  <td>${e.user}</td>
 </tr>`).join("");
 renderUsers();
}

/* ===== USERS ===== */
function addUser(){
 users.push({
  email:newUserEmail.value,
  password:newUserPassword.value,
  role:newUserRole.value
 });
 localStorage.setItem("users",JSON.stringify(users));
 newUserEmail.value=newUserPassword.value="";
 renderUsers();
}

function renderUsers(){
 userTable.innerHTML = `
 <tr><th>E‑Mail</th><th>Rolle</th><th></th></tr>
 ` + users.map((u,i)=>`
 <tr>
  <td>${u.email}</td>
  <td>${u.role}</td>
  <td>${u.email!=="admin@firma.de"?
   `<button onclick="deleteUser(${i})">Löschen</button>`:""}
  </td>
 </tr>`).join("");
}

function deleteUser(i){
 users.splice(i,1);
 localStorage.setItem("users",JSON.stringify(users));
 renderUsers();
}
</script>

</body>
</html>
``
