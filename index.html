<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Enterprise Wareneingangssystem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONS -->
https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css

<style>
:root{
 --primary:#1f2937;
 --secondary:#2563eb;
 --success:#16a34a;
 --warning:#f59e0b;
 --danger:#dc2626;
 --bg:#f4f6f9;
}

*{box-sizing:border-box;font-family:"Segoe UI",system-ui;}
body{margin:0;background:var(--bg);}
.hidden{display:none;}

.card{
 background:white;
 padding:24px;
 border-radius:14px;
 box-shadow:0 15px 30px rgba(0,0,0,.12);
 margin-bottom:20px;
}

button{
 background:var(--secondary);
 color:white;
 border:none;
 padding:14px;
 border-radius:8px;
 cursor:pointer;
}

input,select,textarea{
 width:100%;
 padding:12px;
 margin-bottom:12px;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #ddd;}
th{background:#f1f5f9;text-align:left}

/* LOGIN */
#loginPage{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
}

.login-box{
 width:380px;
 padding:40px;
 background:white;
 border-radius:14px;
}

/* APP */
#app{display:none;}
.sidebar{
 width:260px;
 height:100vh;
 position:fixed;
 background:var(--primary);
 color:white;
 padding:20px;
}
.sidebar h1{margin-bottom:30px;font-size:20px;}
.sidebar button{
 width:100%;
 background:none;
 border:none;
 color:white;
 text-align:left;
 padding:14px;
 border-radius:8px;
}
.sidebar button:hover{background:rgba(255,255,255,.15);}

.main{
 margin-left:280px;
 padding:30px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
 <div class="login-box card">
  <h2>System Login</h2>
  <input id="loginEmail" placeholder="E-Mail">
  <input id="loginPassword" type="password" placeholder="Passwort">
  <button id="loginBtn" type="button">Anmelden</button>
  <p id="loginError" style="color:red;"></p>
 </div>
</div>

<!-- APP -->
<div id="app">
 <div class="sidebar">
  <h1>Wareneingang</h1>
  <button data-page="receive"><i class="fa fa-truck"></i> Wareneingang</button>
  <button data-page="history"><i class="fa fa-clock"></i> Historie</button>
  <button data-page="users" id="usersBtn"><i class="fa fa-users"></i> Benutzer</button>
  <button id="logoutBtn"><i class="fa fa-sign-out"></i> Logout</button>
 </div>

 <div class="main">
  <p><b>Eingeloggt als:</b> <span id="currentUserSpan"></span></p>

  <div id="receive" class="card">
   <h2>Wareneingang</h2>
   <input id="product" placeholder="Produkt">
   <input id="qty" type="number" placeholder="Menge">
   <button type="button">Speichern</button>
  </div>

  <div id="history" class="card hidden">
   <h2>Historie</h2>
   <table id="historyTable"></table>
  </div>

  <div id="users" class="card hidden">
   <h2>Benutzerverwaltung</h2>
   <input id="newUserEmail" placeholder="E-Mail">
   <input id="newUserPassword" placeholder="Passwort">
   <select id="newUserRole">
    <option value="employee">Mitarbeiter</option>
    <option value="admin">Admin</option>
   </select>
   <button id="addUserBtn" type="button">Benutzer anlegen</button>
   <table id="userTable"></table>
  </div>
 </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

 /* === INIT USERS === */
 let users = JSON.parse(localStorage.getItem("users"));
 if(!users){
  users = [{email:"admin@firma.de",password:"admin123",role:"admin"}];
  localStorage.setItem("users",JSON.stringify(users));
 }

 let currentUser = null;

 /* === ELEMENTS === */
 const loginBtn = document.getElementById("loginBtn");
 const loginPage = document.getElementById("loginPage");
 const app = document.getElementById("app");
 const loginError = document.getElementById("loginError");

 loginBtn.addEventListener("click", () => {
  const email = loginEmail.value.trim();
  const password = loginPassword.value.trim();

  const user = users.find(u => u.email === email && u.password === password);
  if(!user){
   loginError.textContent = "Falsche Zugangsdaten";
   return;
  }

  currentUser = user;
  loginPage.style.display = "none";
  app.style.display = "block";
  currentUserSpan.textContent = `${user.email} (${user.role})`;
  if(user.role !== "admin") usersBtn.style.display = "none";
 });

 document.getElementById("logoutBtn").addEventListener("click", () => location.reload());

 document.querySelectorAll(".sidebar button[data-page]").forEach(btn=>{
  btn.addEventListener("click",()=>{
   document.querySelectorAll(".main > div").forEach(p=>p.classList.add("hidden"));
   document.getElementById(btn.dataset.page).classList.remove("hidden");
  });
 });

});
</script>

</body>
</html>
