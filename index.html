<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Enterprise Wareneingangssystem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
 --primary:#1f2937;
 --secondary:#2563eb;
 --success:#16a34a;
 --warning:#f59e0b;
 --danger:#dc2626;
 --bg:#f4f6f9;
}

*{box-sizing:border-box;font-family:"Segoe UI",system-ui;}
body{margin:0;background:var(--bg);}
.hidden{display:none;}

.card{
 background:white;
 padding:24px;
 border-radius:14px;
 box-shadow:0 15px 30px rgba(0,0,0,.12);
 margin-bottom:20px;
}

button{
 background:var(--secondary);
 color:white;
 border:none;
 padding:14px;
 border-radius:8px;
 cursor:pointer;
}

input,select,textarea{
 width:100%;
 padding:12px;
 margin-bottom:12px;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #ddd;}
th{background:#f1f5f9;text-align:left}

/* LOGIN */
#login{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}
.login-box{
 width:380px;
 padding:40px;
 background:white;
 border-radius:14px;
}

/* APP */
#app{display:none;}
.sidebar{
 width:260px;
 height:100vh;
 position:fixed;
 background:var(--primary);
 color:white;
 padding:20px;
}
.sidebar h1{margin-bottom:30px;font-size:20px;}
.sidebar button{
 width:100%;
 background:none;
 border:none;
 color:white;
 text-align:left;
 padding:14px;
 border-radius:8px;
}
.sidebar button:hover{background:rgba(255,255,255,.15);}

.main{
 margin-left:280px;
 padding:30px;
}

.stat{font-size:30px;font-weight:bold;}
.ok{color:var(--success);font-weight:bold;}
.warn{color:var(--warning);font-weight:bold;}
.bad{color:var(--danger);font-weight:bold;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
 <div class="login-box card">
  <h2>System Login</h2>
  <input id="loginEmail" placeholder="E-Mail">
  <input id="loginPassword" type="password" placeholder="Passwort">
  <button onclick="login()">Anmelden</button>
 </div>
</div>

<!-- APP -->
<div id="app">
 <div class="sidebar">
  <h1>Wareneingang</h1>
  <button onclick="show('receive')"><i class="fa fa-truck"></i> Wareneingang</button>
  <button onclick="show('dashboard')"><i class="fa fa-chart-line"></i> Dashboard</button>
  <button onclick="show('history')"><i class="fa fa-database"></i> Historie</button>
  <button onclick="show('users')" id="userBtn"><i class="fa fa-users"></i> Benutzer</button>
  <button onclick="logout()"><i class="fa fa-sign-out"></i> Logout</button>
 </div>

 <div class="main">

 <!-- WARNEINGANG -->
 <div id="receive" class="card">
  <h2>Wareneingang erfassen</h2>
  <label>Barcode / Artikelnummer</label>
  <input id="barcode" autofocus>

  <label>Lieferant</label>
  <select id="supplier">
   <option>Amazon Logistics</option>
   <option>DHL Freight</option>
   <option>DB Schenker</option>
   <option>Interner Lieferant</option>
  </select>

  <label>Lieferscheinnummer</label>
  <input id="delivery">

  <label>Produkt</label>
  <input id="product">

  <label>Menge</label>
  <input type="number" id="qty">

  <label>Zustand</label>
  <select id="state" onchange="checkState()">
   <option value="ok">In Ordnung</option>
   <option value="warn">Leichte Mängel</option>
   <option value="bad">Beschädigt</option>
  </select>

  <label>Bemerkung (Pflicht bei Schaden)</label>
  <textarea id="note"></textarea>

  <button onclick="saveEntry()">Wareneingang buchen</button>
 </div>

 <!-- DASHBOARD -->
 <div id="dashboard" class="hidden">
  <div class="card"><p>Gesamte Eingänge</p><div id="count" class="stat">0</div></div>
  <div class="card"><p>Gesamtmenge</p><div id="sum" class="stat">0</div></div>
  <div class="card"><p>Beschädigt</p><div id="damaged" class="stat">0</div></div>
 </div>

 <!-- HISTORIE -->
 <div id="history" class="hidden card">
  <h2>Wareneingangshistorie</h2>
  <table id="table"></table>
 </div>

 <!-- BENUTZER (ADMIN) -->
 <div id="users" class="hidden card">
  <h2>Benutzerverwaltung</h2>
  <input id="newEmail" placeholder="E-Mail">
  <input id="newPassword" placeholder="Passwort">
  <select id="newRole">
   <option value="employee">Mitarbeiter</option>
   <option value="admin">Admin</option>
  </select>
  <button onclick="addUser()">Benutzer anlegen</button>
  <table id="userTable"></table>
 </div>

 </div>
</div>

<script>
/* USERS */
let users = JSON.parse(localStorage.getItem("users")) || [
 {email:"admin@firma.de",password:"admin123",role:"admin"}
];
localStorage.setItem("users",JSON.stringify(users));

let currentUser=null;
let entries = JSON.parse(localStorage.getItem("entries"))||[];

/* LOGIN */
function login(){
 const u=users.find(x=>x.email===loginEmail.value && x.password===loginPassword.value);
 if(!u){alert("Ungültiger Login");return;}
 currentUser=u;
 login.style.display="none";
 app.style.display="block";
 if(u.role!=="admin") userBtn.style.display="none";
 render();
}

/* NAV */
function show(id){
 document.querySelectorAll(".main>div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
}

function logout(){location.reload();}

/* WARNEINGANG */
function checkState(){
 if(state.value!=="ok") note.placeholder="Schaden beschreiben (Pflicht)";
}

function saveEntry(){
 if(state.value!=="ok" && !note.value){
  alert("Bemerkung bei Schaden erforderlich");
  return;
 }
 entries.push({
  date:new Date().toLocaleString(),
  barcode:barcode.value,
  supplier:supplier.value,
  delivery:delivery.value,
  product:product.value,
  qty:+qty.value,
  state:state.value,
  note:note.value,
  user:currentUser.email
 });
 localStorage.setItem("entries",JSON.stringify(entries));
 barcode.value=delivery.value=product.value=qty.value=note.value="";
 render();
}

/* DASHBOARD + HISTORY */
function render(){
 let t="<tr><th>Datum</th><th>Produkt</th><th>Menge</th><th>Zustand</th><th>Mitarbeiter</th></tr>";
 let sum=0,bad=0;
 entries.forEach(e=>{
  sum+=e.qty;
  if(e.state==="bad")bad++;
  t+=`<tr>
   <td>${e.date}</td>
   <td>${e.product}</td>
   <td>${e.qty}</td>
   <td class="${e.state}">${e.state}</td>
   <td>${e.user}</td>
  </tr>`;
 });
 table.innerHTML=t;
 count.innerText=entries.length;
 sum.innerText=sum;
 damaged.innerText=bad;
 renderUsers();
}

/* USERS */
function addUser(){
 users.push({email:newEmail.value,password:newPassword.value,role:newRole.value});
 localStorage.setItem("users",JSON.stringify(users));
 newEmail.value=newPassword.value="";
 renderUsers();
}

function renderUsers(){
 let t="<tr><th>E-Mail</th><th>Rolle</th><th></th></tr>";
 users.forEach((u,i)=>{
  t+=`<tr>
   <td>${u.email}</td>
   <td>${u.role}</td>
   <td>${u.email!=="admin@firma.de"?`<button onclick="delUser(${i})">Löschen</button>`:""}</td>
  </tr>`;
 });
 userTable.innerHTML=t;
}

function delUser(i){
 users.splice(i,1);
 localStorage.setItem("users",JSON.stringify(users));
 renderUsers();
}
</script>

</body>
</html>
